[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [".venv"]

[tool.ruff.lint]
# pyflakes (F) + pycodestyle (E,W) + isort (I) + bugbear (B) + pyupgrade (UP)
select = ["E", "W", "F", "I", "B", "UP"]
ignore = ["E501"]  # line length handled softly; not a hard failure

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
